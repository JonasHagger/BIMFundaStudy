<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIM Fundamentals</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card-bg: #ffffff;
    --text: #1c1e21;
    --muted: #65676b;
    --accent: #2563eb;
    --green: #16a34a;
    --red: #dc2626;
    --amber: #d97706;
    --radius: 14px;
    --shadow: 0 2px 8px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .app { max-width: 560px; margin: 0 auto; padding: 16px; }
  header { text-align: center; padding: 12px 0 20px; }
  header h1 { font-size: 1.4rem; }
  header p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

  /* ---------- Box overview ---------- */
  .boxes { display: flex; flex-direction: column; gap: 10px; }
  .box {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s;
    width: 100%;
    text-align: left;
    font: inherit;
    color: inherit;
  }
  .box:active { border-color: var(--accent); }
  .box[disabled] { opacity: 0.45; cursor: default; }
  .box-badge {
    width: 44px; height: 44px; flex-shrink: 0;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #fff; font-size: 1.05rem;
  }
  .box-info { flex: 1; }
  .box-info .name { font-weight: 600; }
  .box-info .desc { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }
  .box-count { font-weight: 700; font-size: 1.1rem; color: var(--muted); }

  .train-all {
    margin-top: 16px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow);
  }
  .train-all:active { opacity: 0.85; }
  .train-all[disabled] { background: #9db4dd; cursor: default; }

  .reset {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: var(--radius);
    background: transparent;
    color: var(--muted);
    font-size: 0.8rem;
    cursor: pointer;
    text-decoration: underline;
  }

  /* ---------- Training ---------- */
  .training { display: none; }
  .training.active { display: block; }
  .overview.hidden { display: none; }

  .progressbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; font-size: 0.85rem; color: var(--muted);
  }
  .back-btn {
    border: none; background: none; color: var(--accent);
    font-size: 0.9rem; cursor: pointer; padding: 6px 0; font-weight: 600;
  }

  .flip-scene { perspective: 1200px; }
  .flip-card {
    display: grid;
    width: 100%;
    min-height: 260px;
    transform-style: preserve-3d;
    transition: transform 0.5s;
    cursor: pointer;
  }
  .flip-card.flipped { transform: rotateY(180deg); }
  .face {
    grid-area: 1 / 1;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    display: flex;
    flex-direction: column;
  }
  .face.back { transform: rotateY(180deg); }
  .face-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  }
  .q-text { font-size: 0.95rem; line-height: 1.45; margin-bottom: 12px; }
  .q-text ul, .q-text ol { margin: 6px 0 0 18px; }
  .options { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .options li {
    background: var(--bg);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 0.88rem;
    line-height: 1.35;
  }
  .options li.correct {
    background: #dcfce7;
    border: 1.5px solid var(--green);
    font-weight: 400;
  }
  .options li.correct b { font-weight: 700; }
  .options li.correct ul, .options li.correct ol { margin: 6px 0 6px 18px; }
  .options li.correct table {
    border-collapse: collapse; margin: 8px 0; width: 100%; font-size: 0.82rem;
  }
  .options li.correct th, .options li.correct td {
    border: 1px solid #b8e0c5; padding: 4px 6px; text-align: left; vertical-align: top;
  }
  .options li.correct th { background: #c9f0d6; }
  .qfig { margin-top: 10px; }
  .qfig svg { width: 100%; height: auto; background: #fff; border: 1px solid #e4e6eb; border-radius: 8px; }
  .options li.correct .qfig svg { border-color: #b8e0c5; }
  .tap-hint {
    margin-top: auto; padding-top: 14px;
    text-align: center; color: var(--muted); font-size: 0.8rem;
  }
  .explanation {
    margin-top: 12px; font-size: 0.85rem; color: var(--muted);
    line-height: 1.4; border-top: 1px solid var(--bg); padding-top: 10px;
  }
  .verify-note {
    margin-top: 8px; font-size: 0.75rem; color: var(--amber); font-style: italic;
  }

  .judge {
    display: none;
    gap: 10px;
    margin-top: 14px;
  }
  .judge.visible { display: flex; }
  .judge button {
    flex: 1; padding: 14px; border: none; border-radius: var(--radius);
    font-size: 0.95rem; font-weight: 600; color: #fff; cursor: pointer;
    box-shadow: var(--shadow);
  }
  .judge .no { background: var(--red); }
  .judge .yes { background: var(--green); }
  .judge button:active { opacity: 0.85; }

  .card-meta {
    text-align: center; margin-top: 12px;
    font-size: 0.78rem; color: var(--muted);
  }

  /* ---------- Done screen ---------- */
  .done {
    display: none;
    background: var(--card-bg); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 32px 20px; text-align: center;
  }
  .done.visible { display: block; }
  .done h2 { margin-bottom: 8px; }
  .done p { color: var(--muted); margin-bottom: 18px; }
  .done button {
    padding: 12px 24px; border: none; border-radius: var(--radius);
    background: var(--accent); color: #fff; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>
<div class="app">

  <!-- ================= OVERVIEW ================= -->
  <div id="overview" class="overview">
    <header><p style="text-align:left;margin-bottom:4px;"><a href="index.html" style="color:#2563eb;text-decoration:none;font-weight:600;font-size:0.85rem;">&larr; Start</a></p>
      <h1>&#127891; BIM Fundamentals</h1>
      <p>Leitner-System &middot; offene Fragen wie in der Klausur &middot; Karte antippen zum Umdrehen</p>
    </header>
    <div class="boxes" id="boxList"></div>
    <button class="train-all" id="trainAllBtn">Alle Karten trainieren</button>
    <button class="reset" id="resetBtn">Fortschritt zur&uuml;cksetzen</button>
  </div>

  <!-- ================= TRAINING ================= -->
  <div id="training" class="training">
    <div class="progressbar">
      <button class="back-btn" id="backBtn">&larr; &Uuml;bersicht</button>
      <span id="progressText"></span>
    </div>

    <div class="flip-scene">
      <div class="flip-card" id="flipCard">
        <div class="face front">
          <div class="face-label" id="labelFront">Frage</div>
          <div class="q-text" id="qFront"></div>
          <ul class="options" id="optsFront"></ul>
          <div class="tap-hint">&#128070; Tippen f&uuml;r die L&ouml;sung</div>
        </div>
        <div class="face back">
          <div class="face-label" id="labelBack">L&ouml;sung</div>
          <div class="q-text" id="qBack"></div>
          <ul class="options" id="optsBack"></ul>
          <div class="explanation" id="explanation"></div>
          <div class="verify-note" id="verifyNote"></div>
        </div>
      </div>
    </div>

    <div class="judge" id="judgeBtns">
      <button class="no" id="btnNo">&#10060; Nicht gewusst</button>
      <button class="yes" id="btnYes">&#9989; Gewusst</button>
    </div>
    <div class="card-meta" id="cardMeta"></div>

    <div class="done" id="doneScreen">
      <h2>&#127881; Fertig!</h2>
      <p id="doneStats"></p>
      <button id="doneBackBtn">Zur &Uuml;bersicht</button>
    </div>
  </div>

</div>

   - question:  Fragetext (HTML erlaubt)
   - qSvg:      optionale Abbildung zur Frage (SVG-String)
   - answer:    Loesungstext (HTML erlaubt)

  answer: "<ul><li><b>Geometry</b> = concrete shape information: location/coordinates of vertices, curvature, inclination, formulas of curved surfaces and edges</li><li><b>Topology</b> = the <b>relationships/interconnections</b> between vertices, edges and faces (independent of exact position)</li></ul>",

},
{
  id: 19, topic: "Geometrie",
  question: "Explain the general difference between the <b>explicit</b> and the <b>implicit</b> approach in solid modeling. Naming four advantages or disadvantages of one method is sufficient.",
  answer: "<b>Explicit approach = Boundary Representation (B-rep)</b>: describes a solid by its <b>boundary</b> (faces, edges, vertices).<br><b>Implicit approach = procedural representation (e.g. CSG)</b>: describes a solid by its <b>construction history</b> (operations).<br><table><tr><th></th><th>Implicit (CSG)</th><th>Explicit (B-rep)</th></tr><tr><td>Traceability</td><td>operations traceable</td><td>generation unknown</td></tr><tr><td>Modification</td><td>easy (edit history)</td><td>hard</td></tr><tr><td>File size</td><td>small</td><td>large</td></tr><tr><td>Interpretation</td><td>receiver must re-evaluate</td><td>directly interpretable</td></tr></table>"

{
  id: 20, topic: "Geometrie",
  question: "Describe the Boundary Representation (B-rep): what is its hierarchical structure, and what is a vef graph?",
  answer: "B-rep describes a solid by its boundary:<br><b>Solid &rarr; bounded by Faces &rarr; bounded by Edges &rarr; bounded by Vertices.</b><br>It combines <b>topology</b> (interconnections) + <b>geometry</b> (vertex coordinates, surface formulas).<br><br>A <b>vertex-edge-face (vef) graph</b> describes the <b>topology</b> of a solid: which faces are bounded by which edges, and which edges by which vertices."

{

{

{

{
  id: 28, topic: "Geometrie",
  question: "What are the different curve types used in surface/freeform modeling?",
  answer: "<ul><li><b>B&eacute;zier curves</b> — polynomial approximation of control points; degree = n&minus;1</li><li><b>B-Splines</b> — joined curve segments; degree independent of number of control points; local control</li><li><b>NURBS</b> (Non-Uniform Rational B-Splines) — B-Splines + <b>weights</b> per control point &rarr; exact circles/conic sections</li></ul>",
  explanation: "Steigerung: B&eacute;zier &rarr; B-Spline &rarr; NURBS (jeweils ein Problem gel&ouml;st)."
},
{
  id: 29, topic: "Geometrie",
  question: "Explain B&eacute;zier curves (properties) — or draw an example with 4 control points.",
  answer: "<ul><li>Curve <b>approximates</b> the control polygon; passes <b>only through the first and last</b> control point</li><li><b>Tangential</b> to the first and last polygon segment</li><li><b>Degree of polynomial = number of control points &minus; 1</b> (basis: Bernstein polynomials)</li><li>Problems: many control points &rarr; high degree &rarr; oscillations; moving one control point has a <b>global</b> effect on the whole curve</li></ul>",
  aSvg: "<svg viewBox='0 0 340 150' xmlns='http://www.w3.org/2000/svg'><polyline points='30,120 90,25 230,25 310,110' fill='none' stroke='#65676b' stroke-width='1' stroke-dasharray='5 3'/><path d='M 30 120 C 90 25, 230 25, 310 110' fill='none' stroke='#2563eb' stroke-width='2.5'/><circle cx='30' cy='120' r='5' fill='#dc2626'/><circle cx='90' cy='25' r='5' fill='#dc2626'/><circle cx='230' cy='25' r='5' fill='#dc2626'/><circle cx='310' cy='110' r='5' fill='#dc2626'/><text x='22' y='138' font-size='10'>P0</text><text x='84' y='18' font-size='10'>P1</text><text x='226' y='18' font-size='10'>P2</text><text x='306' y='128' font-size='10'>P3</text><text x='150' y='105' font-size='9' fill='#2563eb'>Kurve (Grad 3 = 4&minus;1)</text><text x='120' y='40' font-size='9' fill='#65676b'>Kontrollpolygon</text></svg>",
  explanation: "Erfinder: B&eacute;zier (Renault) &amp; de Casteljau (Citro&euml;n)."
},
{
  id: 30, topic: "Geometrie",
  question: "B-Splines vs. B&eacute;zier curves: what do they have in common, what is different?",
  answer: "<b>Common:</b><ul><li>Arbitrary number of control points</li><li>Pass through first and last control point</li><li>Tangential to first/last segment of the control polygon</li></ul><b>Different (B-Spline advantages):</b><ul><li>Control point has only <b>local</b> impact on the curve</li><li><b>Degree independent of the number of control points</b> (smooth low degree p&asymp;3 with many points)</li></ul>"
},
{
  id: 31, topic: "Geometrie",
  question: "Why were NURBS introduced? What problem of B-Splines do they solve, and how?",
  answer: "B-Splines <b>cannot exactly represent circles, ellipses and other conic sections</b>.<br><br><b>NURBS</b> (Non-Uniform Rational B-Splines) give every control point a <b>weight</b> (homogeneous coordinate: P=(x,y,z) &rarr; Ph=(hx,hy,hz,h)) &rarr; additional influence on the curve &rarr; <b>exact conic sections</b> possible. NURBS surfaces (parameters u,v) are the basis of freeform modelers like <b>Rhino</b>."
},
{

  question: "Name and explain the three different types of continuity for joining curves.",

},

{

  question: "What is concurrency control and why is it necessary in synchronous model-based collaboration?",
  answer: "Concurrency control = <b>locking an object while it is being modified</b> by a user (cycle: <b>retrieve lock &rarr; modify &rarr; release lock</b>).<br><br><b>Necessary because:</b> it prevents two or more users from <b>simultaneously modifying the same object</b>, which would lead to conflicts/inconsistencies in the model.<br><br>Key design questions: <b>granularity</b> (atomic object, lock duration) and <b>handling of dependent objects</b>."

/* Antworten von Claude bestimmt – bitte einmal fachlich prüfen. */
const ANSWERS_NEED_VERIFICATION = true;

/* ===================== Leitner-Logik ===================== */
const NUM_BOXES = 5;
const BOX_META = [
  { name: "Box 1", desc: "Nicht gelernt", color: "#dc2626" },
  { name: "Box 2", desc: "Kaum gelernt", color: "#ea580c" },
  { name: "Box 3", desc: "Teilweise gelernt", color: "#d97706" },
  { name: "Box 4", desc: "Gut gelernt", color: "#65a30d" },
  { name: "Box 5", desc: "Gemeistert", color: "#16a34a" }
];
const STORAGE_KEY = "lernkarten-bim-fundamentals-v1";

let progress = loadProgress();

function loadProgress() {
  let saved = {};
  try {
    saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch (e) { saved = {}; }
  const p = {};
  for (const c of CARDS) {
    const box = saved[c.id];
    p[c.id] = (Number.isInteger(box) && box >= 1 && box <= NUM_BOXES) ? box : 1;
  }
  return p;
}
function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch (e) {}
}
function cardsInBox(n) { return CARDS.filter(c => progress[c.id] === n); }
function promote(card) { progress[card.id] = Math.min(NUM_BOXES, progress[card.id] + 1); saveProgress(); }
function demote(card)  { progress[card.id] = 1; saveProgress(); }

/* ===================== DOM refs ===================== */
const $ = id => document.getElementById(id);
const overviewEl = $("overview"), trainingEl = $("training");
const flipCard = $("flipCard"), judgeBtns = $("judgeBtns"), doneScreen = $("doneScreen");

/* ===================== Overview ===================== */
function renderOverview() {
  const list = $("boxList");
  list.innerHTML = "";
  for (let i = 1; i <= NUM_BOXES; i++) {
    const cards = cardsInBox(i);
    const meta = BOX_META[i - 1];
    const btn = document.createElement("button");
    btn.className = "box";
    btn.disabled = cards.length === 0;
    btn.innerHTML =
      '<div class="box-badge" style="background:' + meta.color + '">' + i + '</div>' +
      '<div class="box-info"><div class="name">' + meta.name + '</div>' +
      '<div class="desc">' + meta.desc + '</div></div>' +
      '<div class="box-count">' + cards.length + '</div>';
    btn.addEventListener("click", () => startTraining(cards, meta.name));
    list.appendChild(btn);
  }
  $("trainAllBtn").disabled = CARDS.length === 0;
}

/* ===================== Training ===================== */
let queue = [], current = null, sessionLabel = "", stats = { yes: 0, no: 0 };

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startTraining(cards, label) {
  if (!cards.length) return;
  queue = shuffle(cards);
  sessionLabel = label;
  stats = { yes: 0, no: 0 };
  overviewEl.classList.add("hidden");
  trainingEl.classList.add("active");
  doneScreen.classList.remove("visible");
  nextCard();
}

function nextCard() {
  if (!queue.length) { finishSession(); return; }
  current = queue.shift();
  flipCard.classList.remove("flipped");
  judgeBtns.classList.remove("visible");
  flipCard.style.display = "";
  renderCard(current);
  updateProgressText();
}

function renderCard(card) {
  const topic = card.topic ? " &middot; " + card.topic : "";
  $("labelFront").innerHTML = "Frage" + topic;
  $("labelBack").innerHTML = "L&ouml;sung" + topic;

  $("qFront").innerHTML = card.question +
    (card.qSvg ? '<div class="qfig">' + card.qSvg + '</div>' : '');
  $("qBack").innerHTML = card.question;

  const front = $("optsFront"), back = $("optsBack");
  front.innerHTML = ""; back.innerHTML = "";

  const liB = document.createElement("li");
  liB.classList.add("correct");
  liB.innerHTML = card.answer +
    (card.aSvg ? '<div class="qfig">' + card.aSvg + '</div>' : '');
  back.appendChild(liB);

  $("explanation").innerHTML = card.explanation || "";
  $("explanation").style.display = card.explanation ? "" : "none";
  $("verifyNote").textContent = ANSWERS_NEED_VERIFICATION
    ? "Hinweis: Lösung von Claude bestimmt – bitte einmal verifizieren." : "";
  $("cardMeta").textContent = "Karte #" + card.id + " · aktuell in Box " + progress[card.id];
}

function updateProgressText() {
  const total = stats.yes + stats.no + queue.length + 1;
  const pos = stats.yes + stats.no + 1;
  $("progressText").textContent = sessionLabel + " · Karte " + pos + " / " + total;
}

flipCard.addEventListener("click", () => {
  if (!flipCard.classList.contains("flipped")) {
    flipCard.classList.add("flipped");
    judgeBtns.classList.add("visible");
  }
});

$("btnYes").addEventListener("click", () => { stats.yes++; promote(current); nextCard(); });
$("btnNo").addEventListener("click", () => { stats.no++; demote(current); nextCard(); });

function finishSession() {
  flipCard.style.display = "none";
  judgeBtns.classList.remove("visible");
  $("progressText").textContent = sessionLabel;
  $("cardMeta").textContent = "";
  $("doneStats").textContent =
    stats.yes + " gewusst · " + stats.no + " nicht gewusst";
  doneScreen.classList.add("visible");
}

function backToOverview() {
  trainingEl.classList.remove("active");
  overviewEl.classList.remove("hidden");
  doneScreen.classList.remove("visible");
  flipCard.style.display = "";
  renderOverview();
}
$("backBtn").addEventListener("click", backToOverview);
$("doneBackBtn").addEventListener("click", backToOverview);

$("trainAllBtn").addEventListener("click", () => startTraining(CARDS, "Alle Karten"));

$("resetBtn").addEventListener("click", () => {
  if (confirm("Gesamten Lernfortschritt zurücksetzen?")) {
    for (const c of CARDS) progress[c.id] = 1;
    saveProgress();
    renderOverview();
  }
});

renderOverview();
</script>
